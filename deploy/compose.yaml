name: oath-registry

services:
  postgres:
    image: postgres:17.10-bookworm
    environment:
      POSTGRES_DB: oath
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_USER: oath
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oath -d oath"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  registry:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      analysis-worker:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://oath:${POSTGRES_PASSWORD}@postgres:5432/oath
      OATH_DATABASE_ROLE: oath_api
      OATH_OBJECT_BACKEND: local
      OATH_PUBLIC_URL: ${OATH_PUBLIC_URL:-http://localhost:4873}
      OATH_REGISTRY_ORG: ${OATH_REGISTRY_ORG:-default}
      OATH_REGISTRY_TOKEN: ${OATH_REGISTRY_TOKEN:?set OATH_REGISTRY_TOKEN}
      OATH_REQUIRE_STEP_UP_APPROVAL: ${OATH_REQUIRE_STEP_UP_APPROVAL:-false}
      OATH_ANALYZER_BACKEND: remote
      OATH_ANALYZER_URL: http://analysis-worker:4874
      OATH_ANALYZER_TOKEN: ${OATH_ANALYZER_TOKEN:?set OATH_ANALYZER_TOKEN}
      OATH_REGISTRY_RATE_LIMIT_BACKEND: ${OATH_REGISTRY_RATE_LIMIT_BACKEND:-postgres}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OATH_REGISTRY_SIGNER: ${OATH_REGISTRY_SIGNER:-file}
    ports:
      - "${OATH_REGISTRY_PORT:-4873}:4873"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    volumes:
      - registry-data:/var/lib/oath-registry

  analysis-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["analysis-worker"]
    environment:
      OATH_ANALYZER_BIND: 0.0.0.0:4874
      OATH_ANALYZER_TOKEN: ${OATH_ANALYZER_TOKEN:?set OATH_ANALYZER_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --header='Authorization: Bearer ${OATH_ANALYZER_TOKEN}' http://localhost:4874/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    read_only: true
    tmpfs:
      - /tmp:size=1g,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  outbox-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["outbox-worker"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://oath:${POSTGRES_PASSWORD}@postgres:5432/oath
      OATH_DATABASE_ROLE: oath_worker
      OATH_OBJECT_BACKEND: local
      OATH_ANALYZER_BACKEND: inline
      OATH_REGISTRY_RATE_LIMIT_BACKEND: postgres
      OATH_REGISTRY_SIGNER: ${OATH_REGISTRY_SIGNER:-file}
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    volumes:
      - registry-data:/var/lib/oath-registry

  maintenance-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["maintenance-worker"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://oath:${POSTGRES_PASSWORD}@postgres:5432/oath
      OATH_DATABASE_ROLE: oath_worker
      OATH_OBJECT_BACKEND: local
      OATH_ANALYZER_BACKEND: inline
      OATH_REGISTRY_RATE_LIMIT_BACKEND: ${OATH_REGISTRY_RATE_LIMIT_BACKEND:-postgres}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OATH_REGISTRY_SIGNER: ${OATH_REGISTRY_SIGNER:-file}
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    volumes:
      - registry-data:/var/lib/oath-registry

  redis:
    image: redis:8.2-alpine
    profiles: ["redis"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://oath:${POSTGRES_PASSWORD}@postgres:5432/oath
    restart: "no"

volumes:
  postgres-data:
  registry-data:
