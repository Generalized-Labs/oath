apiVersion: batch/v1
kind: Job
metadata:
  name: oath-registry-migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oath-registry
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: oath-registry
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: oath-registry:local
          imagePullPolicy: IfNotPresent
          args: ["migrate"]
          env:
            - name: OATH_MIGRATION_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: oath-registry-secrets
                  key: migration-database-url
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
