apiVersion: apps/v1
kind: Deployment
metadata:
  name: oath-outbox-worker
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: oath-outbox-worker}
  template:
    metadata:
      labels: {app.kubernetes.io/name: oath-outbox-worker}
    spec:
      serviceAccountName: oath-registry
      securityContext:
        fsGroup: 10001
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: outbox-worker
          image: oath-registry:local
          args: ["outbox-worker"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: oath-registry-secrets, key: worker-database-url}
            - {name: OATH_DATABASE_ROLE, value: oath_worker}
            - {name: OATH_OBJECT_BACKEND, value: local}
            - {name: OATH_ANALYZER_BACKEND, value: inline}
            - {name: OATH_REGISTRY_RATE_LIMIT_BACKEND, value: postgres}
            - {name: OATH_REGISTRY_SIGNER, value: file}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
          volumeMounts:
            - {name: data, mountPath: /var/lib/oath-registry}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: oath-registry-data}
