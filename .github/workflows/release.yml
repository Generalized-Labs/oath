name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      # Don't cancel the other platforms if one fails -- ship what we can.
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: oath-darwin-arm64
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: oath-darwin-x64
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: oath-linux-x64
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: oath-linux-arm64
            use_cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # rustls (ring) means no system OpenSSL is needed on the cross targets.
      - name: Build with cargo
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} --bin oath

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --bin oath

      - name: Rename binary and checksum
        run: |
          cp "target/${{ matrix.target }}/release/oath" "${{ matrix.asset }}"
          shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          cat "${{ matrix.asset }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cat ./*.sha256 > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            oath-darwin-arm64
            oath-darwin-x64
            oath-linux-x64
            oath-linux-arm64
            checksums.txt
