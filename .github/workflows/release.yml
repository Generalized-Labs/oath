name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build:
    strategy:
      # Don't cancel the other platforms if one fails -- ship what we can.
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: oath-darwin-arm64
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: oath-darwin-x64
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: oath-linux-x64
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: oath-linux-arm64
            use_cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5 --locked

      # rustls (ring) means no system OpenSSL is needed on the cross targets.
      - name: Build with cargo
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }} --bin oath

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }} --bin oath

      - name: Rename binary and checksum
        run: |
          cp "target/${{ matrix.target }}/release/oath" "${{ matrix.asset }}"
          shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          cat "${{ matrix.asset }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cat ./*.sha256 > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            oath-darwin-arm64 \
            oath-darwin-arm64.sha256 \
            oath-darwin-x64 \
            oath-darwin-x64.sha256 \
            oath-linux-x64 \
            oath-linux-x64.sha256 \
            oath-linux-arm64 \
            oath-linux-arm64.sha256 \
            checksums.txt
