name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: oath
          POSTGRES_PASSWORD: oath
          POSTGRES_DB: oath_release
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oath -d oath_release"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      OATH_TEST_DATABASE_URL: postgresql://oath:oath@localhost:5432/oath_release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Verify tag and changelog version
        shell: bash
        run: |
          set -euo pipefail
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)
          test "v${version}" = "$GITHUB_REF_NAME"
          grep -F "## [${version}] - " CHANGELOG.md
          git fetch origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Require full release evidence for the tagged commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow ci.yml \
            --commit "$GITHUB_SHA" \
            --event workflow_dispatch \
            --status success \
            --limit 100 \
            --json databaseId \
            --jq '.[0].databaseId')
          test -n "$run_id"
          gate=$(gh run view "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --json jobs \
            --jq '.jobs[] | select(.name == "release-evidence-gate") | .conclusion')
          test "$gate" = success
          echo "Full release evidence passed in CI run $run_id"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --component rustfmt --component clippy
          rustup toolchain install 1.94.0 --profile minimal
          rustup default stable

      - name: Install Linux sandbox linker dependency
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

      - name: Verify Rust workspace
        run: |
          cargo +1.94.0 check --workspace --locked --all-targets
          cargo fmt --all -- --check
          cargo clippy --workspace --locked --all-targets -- -D warnings
          cargo test --workspace --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit locked Rust dependencies
        run: cargo audit --deny warnings

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.13.0

      - name: Verify evidence website
        run: |
          npm ci --prefix website
          npm audit --prefix website --audit-level=moderate
          npm run build --prefix website

  build:
    needs: verify
    strategy:
      # Let every platform report its result; release creation still requires all.
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            asset: oath-darwin-arm64
            binary: oath
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-15
            asset: oath-darwin-x64
            binary: oath
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: oath-linux-x64
            binary: oath
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: oath-linux-arm64
            binary: oath
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: oath-windows-x64.exe
            binary: oath.exe
            use_cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            asset: oath-windows-arm64.exe
            binary: oath.exe
            use_cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5 --locked

      # rustls (ring) means no system OpenSSL is needed on the cross targets.
      - name: Build with cargo
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }} --bin oath

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }} --bin oath

      - name: Rename binary and checksum
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset }}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
          cat "${{ matrix.asset }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      actions: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install Node.js for contract publication
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.13.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true

      - name: Build exact-commit agent contract bundle
        run: |
          set -euo pipefail
          node scripts/build-contract-bundle.mjs contract-dist
          (cd contract-dist && sha256sum --check SHA256SUMS)
          tar -czf "oath-agent-contracts-${GITHUB_REF_NAME}.tar.gz" -C contract-dist .
          sha256sum "oath-agent-contracts-${GITHUB_REF_NAME}.tar.gz" > "oath-agent-contracts-${GITHUB_REF_NAME}.tar.gz.sha256"

      - name: Aggregate checksums
        run: |
          cat ./*.sha256 > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Download exact-commit GA evidence manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow ci.yml \
            --commit "$GITHUB_SHA" \
            --event workflow_dispatch \
            --status success \
            --limit 100 \
            --json databaseId \
            --jq '.[0].databaseId')
          test -n "$run_id"
          gh run download "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --name ga-evidence-manifest \
            --dir release-evidence
          (cd release-evidence && sha256sum --check ga-evidence-manifest.json.sha256)
          test "$(jq -r .commit release-evidence/ga-evidence-manifest.json)" = "$GITHUB_SHA"

      - name: Attest release binaries
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            oath-darwin-arm64
            oath-darwin-x64
            oath-linux-x64
            oath-linux-arm64
            oath-windows-x64.exe
            oath-windows-arm64.exe
            oath-agent-contracts-${{ github.ref_name }}.tar.gz
            contract-dist/contract-manifest.json
            contract-dist/schemas/exec-assessment-v3.schema.json
            contract-dist/schemas/publish-assessment-v2.schema.json
            contract-dist/schemas/registry-verdict-v1.schema.json

      - name: Create and verify draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          evidence_status=$(jq -r .evidence_status release-evidence/ga-evidence-manifest.json)
          release_flags=()
          case "$evidence_status" in
            ga)
              ;;
            developer-preview)
              release_flags+=(
                --prerelease
                --title "Oath ${GITHUB_REF_NAME} (developer preview)"
                --notes "Developer preview. Oath is not generally available; the attached signed evidence manifest records the passed checks and remaining GA gates for this exact commit."
              )
              ;;
            *)
              echo "Unsupported evidence status: $evidence_status" >&2
              exit 1
              ;;
          esac
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            --draft \
            "${release_flags[@]}" \
            oath-darwin-arm64 \
            oath-darwin-arm64.sha256 \
            oath-darwin-x64 \
            oath-darwin-x64.sha256 \
            oath-linux-x64 \
            oath-linux-x64.sha256 \
            oath-linux-arm64 \
            oath-linux-arm64.sha256 \
            oath-windows-x64.exe \
            oath-windows-x64.exe.sha256 \
            oath-windows-arm64.exe \
            oath-windows-arm64.exe.sha256 \
            "oath-agent-contracts-${GITHUB_REF_NAME}.tar.gz" \
            "oath-agent-contracts-${GITHUB_REF_NAME}.tar.gz.sha256" \
            contract-dist/contract-manifest.json \
            contract-dist/contract-manifest.json.sha256 \
            contract-dist/schemas/exec-assessment-v3.schema.json \
            contract-dist/schemas/publish-assessment-v2.schema.json \
            contract-dist/schemas/registry-verdict-v1.schema.json \
            contract-dist/types/oath-contracts.ts \
            checksums.txt \
            release-evidence/ga-evidence-manifest.json \
            release-evidence/ga-evidence-manifest.json.sha256

          cat > expected-assets.txt <<EOF
          checksums.txt
          contract-manifest.json
          contract-manifest.json.sha256
          exec-assessment-v3.schema.json
          ga-evidence-manifest.json
          ga-evidence-manifest.json.sha256
          oath-agent-contracts-${GITHUB_REF_NAME}.tar.gz
          oath-agent-contracts-${GITHUB_REF_NAME}.tar.gz.sha256
          oath-contracts.ts
          oath-darwin-arm64
          oath-darwin-arm64.sha256
          oath-darwin-x64
          oath-darwin-x64.sha256
          oath-linux-arm64
          oath-linux-arm64.sha256
          oath-linux-x64
          oath-linux-x64.sha256
          oath-windows-arm64.exe
          oath-windows-arm64.exe.sha256
          oath-windows-x64.exe
          oath-windows-x64.exe.sha256
          publish-assessment-v2.schema.json
          registry-verdict-v1.schema.json
          EOF
          gh release view "$GITHUB_REF_NAME" \
            --json assets \
            --jq '.assets[].name' \
            | sort > actual-assets.txt
          sort -o expected-assets.txt expected-assets.txt
          diff -u expected-assets.txt actual-assets.txt

      - name: Publish verified GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
