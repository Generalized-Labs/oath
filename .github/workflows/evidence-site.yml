name: Evidence website

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - "compat-results/ga/summary.json"
      - ".github/workflows/evidence-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
      - name: Install Rust toolchain
        run: rustup toolchain install stable && rustup default stable
      - name: Install Linux sandbox linker dependency
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Build Oath
        run: cargo build --release --locked --bin oath
      - name: Install website through Oath
        working-directory: website
        run: ../target/release/oath ci
      - name: Build website through Oath
        working-directory: website
        run: ../target/release/oath run build
        env:
          GITHUB_PAGES: "true"
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
