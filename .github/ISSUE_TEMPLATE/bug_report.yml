name: Bug report
description: Report something that does not work as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands and files needed to reproduce the issue.
      render: sh
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: oath version
      placeholder: oath --version
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: macOS arm64, Linux x64, etc.
    validations:
      required: true
