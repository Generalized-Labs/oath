openapi: 3.1.0
info:
  title: Oath Registry API
  version: 0.2.0
  description: >-
    Developer-preview control-plane, verdict, revocation, and transparency API.
    Ed25519 payloads use the oath-json-v1 canonicalization defined in
    contracts/README.md.
servers:
  - url: https://registry.oath.dev
paths:
  /livez:
    get:
      summary: Process liveness
      responses:
        "200": { description: Process is serving requests }
  /readyz:
    get:
      summary: PostgreSQL and object-store readiness
      responses:
        "200": { description: Every required dependency is ready }
        "500": { description: A required dependency is unavailable }
  /-/oath/stages:
    post:
      summary: Stage an immutable npm artifact for server assessment
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Artifact staged and independently assessed }
        "400": { description: Invalid archive, identity, or assessment input }
        "403": { description: Publisher is not authorized for the package }
    get:
      summary: List visible staged artifacts
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Stages visible to the caller }
  /-/oath/stages/{id}/approve:
    post:
      summary: Promote a non-denied stage after explicit review
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Stage promoted atomically }
        "403": { description: Admin or configured step-up authentication required }
        "409": { description: Stage already decided or server verdict denied }
  /-/oath/versions/{name}/{version}/revoke:
    post:
      summary: Revoke or quarantine an immutable version and roll back tags
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
        - in: path
          name: version
          required: true
          schema: { type: string }
      responses:
        "200": { description: Signed tombstone and deterministic rollback created }
  /v1/verdicts/{name}/{version}:
    get:
      summary: Download an offline-verifiable verdict, evidence, SBOM, provenance, tombstone, and checkpoint bundle
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
        - in: path
          name: version
          required: true
          schema: { type: string }
      responses:
        "200": { description: Verdict, tombstone, digest, and signed checkpoint }
        "401": { description: Private package authentication required }
  /v1/security/osv:
    get:
      summary: Public quarantined-package advisories in OSV shape
      responses:
        "200": { description: Public npm advisories; private names are excluded }
  /-/oath/transparency/checkpoint:
    get:
      summary: Current signed transparency checkpoint
      responses:
        "200": { description: Signed tree size, root, and latest event hash }
  /-/oath/transparency/inclusion/{sequence}:
    get:
      summary: Merkle inclusion proof for an event sequence
      parameters:
        - in: path
          name: sequence
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200": { description: Leaf hash, root, and sibling proof }
  /-/oath/transparency/consistency:
    get:
      summary: Complete-leaf consistency bundle
      parameters:
        - in: query
          name: from
          required: true
          schema: { type: integer, minimum: 0 }
      responses:
        "200": { description: Recomputable old/new roots and complete leaf set }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
